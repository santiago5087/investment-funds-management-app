<div class="funds-page">
  <header class="page-header">
    <h1>Fondos Disponibles</h1>
    <p class="subtitle">Explora y suscríbete a los fondos de inversión</p>
  </header>

  @if (error$ | async; as error) {
    <app-alert type="error" (dismiss)="clearError()">
      {{ error }}
    </app-alert>
  }

  @if (selectedFund()) {
    <div class="modal-overlay" (click)="closeModal()">
      <div class="modal-content" (click)="$event.stopPropagation()">
        <app-subscription-form
          [fundName]="selectedFund()!.name"
          [minimumAmount]="selectedFund()!.minimumAmount"
          [currentBalance]="(balance$ | async) || 0"
          (onSubmit)="handleSubscribe($event)"
          (onCancel)="closeModal()"
        />
      </div>
    </div>
  }

  <app-funds-grid
    [funds]="(availableFunds$ | async) || []"
    [loading]="(loading$ | async) || false"
    [subscribedFundIds]="subscribedIds()"
    (onSubscribe)="openSubscriptionModal($event)"
    (onCancel)="handleCancel($event)"
  />
</div>

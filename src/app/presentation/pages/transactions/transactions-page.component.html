<div class="transactions-page">
  <header class="page-header">
    <div class="header-content">
      <div class="title-wrapper">
        <span class="material-icons header-icon">receipt_long</span>
        <div>
          <h1>Historial de Transacciones</h1>
          <p class="subtitle">Todas tus operaciones de inversión</p>
        </div>
      </div>
      <div class="stats-summary">
        <div class="stat-chip">
          <span class="material-icons">history</span>
          <span>{{ (transactions$ | async)?.length || 0 }} Transacciones</span>
        </div>
      </div>
    </div>
  </header>

  <app-transactions-table [transactions]="(transactions$ | async) || []" />
</div>

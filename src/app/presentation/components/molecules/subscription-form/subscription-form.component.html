<form (ngSubmit)="handleSubmit()" class="subscription-form">
  <h2 mat-dialog-title>{{ fundName() }}</h2>
  
  <div class="form-content">
    <app-input
      label="Monto a invertir"
      type="number"
      placeholder="Ingrese el monto"
      [min]="minimumAmount()"
      [(value)]="amount"
      [helperText]="'Monto mínimo: $' + minimumAmount().toLocaleString('es-CO')"
      [error]="amountError"
    />

    <div class="notification-field">
      <label class="field-label">Método de notificación</label>
      <mat-radio-group [(ngModel)]="notificationMethod" name="notification" class="radio-group">
        <mat-radio-button value="email">Email</mat-radio-button>
        <mat-radio-button value="sms">SMS</mat-radio-button>
      </mat-radio-group>
    </div>
  </div>

  <div class="form-actions">
    <app-button 
      type="button" 
      variant="primary" 
      (clicked)="onCancel.emit()"
      [fullWidth]="true"
    >
      Cancelar
    </app-button>
    <app-button 
      type="submit"
      variant="primary"
      [fullWidth]="true"
      [disabled]="!isValid()"
    >
      Confirmar suscripción
    </app-button>
  </div>
</form>

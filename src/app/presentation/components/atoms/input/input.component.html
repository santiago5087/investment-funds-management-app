<mat-form-field appearance="outline" class="full-width">
  @if (label()) {
    <mat-label>{{ label() }}</mat-label>
  }
  <input
    matInput
    [type]="type()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [(ngModel)]="value"
    [min]="min()"
    [max]="max()"
  />
  @if (helperText() && !error()) {
    <mat-hint>{{ helperText() }}</mat-hint>
  }
  @if (error()) {
    <mat-error>{{ error() }}</mat-error>
  }
</mat-form-field>
